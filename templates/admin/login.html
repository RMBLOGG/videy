{% extends 'base.html' %}
{% block title %}Login Admin — VIDEY{% endblock %}
{% block head %}
<style>
  .login-page { min-height:calc(100vh - 120px); display:flex; align-items:center; justify-content:center; padding:2rem 1.25rem; }
  .login-card { width:100%; max-width:380px; }
  .login-brand { text-align:center; margin-bottom:2rem; }
  .login-brand .logo { font-size:2rem; font-weight:800; letter-spacing:-.04em; display:flex; align-items:center; justify-content:center; gap:8px; }
  .login-brand .dot { width:10px; height:10px; border-radius:50%; background:var(--accent); box-shadow:0 0 14px var(--accent); }
  .login-brand p { color:var(--muted2); font-size:.875rem; margin-top:.4rem; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2rem; }
  .form-group { margin-bottom:1.25rem; }
  .form-group label { display:block; font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
  .form-group input { width:100%; padding:.7rem 1rem; background:var(--surface2); border:1px solid var(--border); border-radius:10px; outline:none; color:var(--text); font-family:var(--font); font-size:.95rem; transition:border-color .2s,box-shadow .2s; }
  .form-group input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--glow); }
  .login-btn { width:100%; padding:.75rem; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:var(--font); font-weight:700; font-size:1rem; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px var(--glow); margin-top:.25rem; }
  .login-btn:hover { opacity:.88; transform:translateY(-1px); }
</style>
{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <div class="logo"><span class="dot"></span>VIDEY</div>
      <p>Masuk ke panel admin</p>
    </div>
    <div class="card">
      <form method="POST">
        <div class="form-group">
          <label>Username</label>
          <input type="text" name="username" required autofocus placeholder="Masukkan username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" name="password" required placeholder="••••••••"/>
        </div>
        <button type="submit" class="login-btn">Masuk →</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
