{% extends 'base.html' %}
{% block title %}Admin Login — VIDEY{% endblock %}

{% block head %}
<style>
  .login-wrap {
    min-height: calc(100vh - 100px);
    display: flex; align-items: center; justify-content: center;
    padding: 2rem;
  }
  .login-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 2.5rem;
    width: 100%; max-width: 380px;
  }
  .login-card h1 {
    font-family: var(--font-head);
    font-size: 1.8rem; font-weight: 800;
    letter-spacing: -0.03em; margin-bottom: 0.3rem;
  }
  .login-card h1 span { color: var(--accent); }
  .login-card p { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
  .form-group { margin-bottom: 1.2rem; }
  .form-group label {
    display: block; font-size: 0.8rem;
    color: var(--muted); margin-bottom: 0.4rem;
    font-family: var(--font-head); letter-spacing: 0.05em; text-transform: uppercase;
  }
  .form-group input {
    width: 100%; padding: 0.7rem 1rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px; outline: none;
    color: var(--text); font-family: var(--font-body);
    font-size: 0.95rem;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .login-btn {
    width: 100%; padding: 0.75rem;
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    font-family: var(--font-head); font-weight: 700;
    font-size: 1rem; cursor: pointer;
    transition: opacity 0.2s; margin-top: 0.5rem;
  }
  .login-btn:hover { opacity: 0.85; }
</style>
{% endblock %}

{% block content %}
<div class="login-wrap">
  <div class="login-card">
    <h1>VID<span>EY</span></h1>
    <p>Masuk sebagai admin untuk mengelola video.</p>

    <form method="POST">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus placeholder="admin" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="••••••••" />
      </div>
      <button type="submit" class="login-btn">Masuk →</button>
    </form>
  </div>
</div>
{% endblock %}
