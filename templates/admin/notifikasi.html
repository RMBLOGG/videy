{% extends 'admin/base.html' %}
{% block title %}Kelola Notifikasi — Admin{% endblock %}
{% block head %}
<style>
  .notif-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1.25rem}
  .notif-card h3{font-size:1rem;font-weight:700;margin-bottom:1.1rem;display:flex;align-items:center;gap:.5rem}
  .field-row{margin-bottom:.875rem}
  .field-row label{display:block;font-size:.7rem;font-weight:700;text-transform:uppercase;color:var(--muted);margin-bottom:.35rem;letter-spacing:.07em}
  .field-row input,.field-row textarea,.field-row select{width:100%;padding:.65rem .9rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font);font-size:.9rem;outline:none;box-sizing:border-box}
  .field-row input:focus,.field-row textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}
  .item-row{display:grid;grid-template-columns:1fr 1fr auto;gap:.5rem;align-items:center;margin-bottom:.5rem}
  .item-row input{margin:0}
  .del-btn{background:rgba(255,77,109,.12);border:1px solid rgba(255,77,109,.2);color:var(--red);border-radius:8px;padding:.5rem .7rem;cursor:pointer;font-size:.85rem;flex-shrink:0}
  .del-btn:hover{background:rgba(255,77,109,.22)}
  .add-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:.5rem 1rem;cursor:pointer;font-size:.85rem;font-weight:600;margin-top:.4rem}
  .add-btn:hover{border-color:var(--accent);color:var(--accent)}
  .col-header{font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--muted);letter-spacing:.07em;padding-bottom:.25rem}
  .toggle-wrap{display:flex;align-items:center;gap:.5rem;font-size:.9rem;cursor:pointer}
  .save-btn{margin-top:.5rem}
</style>
{% endblock %}
{% block content %}
<div style="max-width:780px;margin:0 auto;padding:1.5rem 1rem">
  <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:1.5rem"><i class="fa fa-bell"></i> Kelola Notifikasi</h2>

  <!-- BANNER -->
  <div class="notif-card">
    <h3><i class="fa fa-megaphone" style="color:var(--accent2)"></i> Banner Pengumuman</h3>
    <form method="POST" action="{{ url_for('admin_banner_save') }}">
      <div class="field-row">
        <label>Teks Banner</label>
        <input type="text" name="konten" value="{{ banner.konten if banner else '' }}" placeholder="🎉 Promo! Voucher No-Ads diskon 50% minggu ini."/>
      </div>
      <div class="field-row">
        <label>Warna</label>
        <select name="warna">
          <option value="info"    {% if not banner or banner.warna=='info'    %}selected{% endif %}>🔵 Info (Ungu)</option>
          <option value="warning" {% if banner and banner.warna=='warning' %}selected{% endif %}>🟡 Warning (Kuning)</option>
          <option value="danger"  {% if banner and banner.warna=='danger'  %}selected{% endif %}>🔴 Danger (Merah)</option>
          <option value="success" {% if banner and banner.warna=='success' %}selected{% endif %}>🟢 Success (Hijau)</option>
        </select>
      </div>
      <label class="toggle-wrap" style="margin-bottom:1rem">
        <input type="checkbox" name="aktif" value="1" {% if banner and banner.aktif %}checked{% endif %}>
        Tampilkan banner
      </label>
      <br>
      <button type="submit" class="btn btn-primary btn-sm save-btn"><i class="fa fa-save"></i> Simpan Banner</button>
    </form>
  </div>

  <!-- MARQUEE -->
  <div class="notif-card">
    <h3><i class="fa fa-scroll" style="color:#fbbf24"></i> Teks Berjalan (Marquee)</h3>
    <form method="POST" action="{{ url_for('admin_marquee_save') }}">
      <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:.5rem;margin-bottom:.4rem">
        <div class="col-header">Judul / Label</div>
        <div class="col-header">Link (opsional)</div>
        <div></div>
      </div>
      <div id="itemList">
        {% for item in marquee_items %}
        <div class="item-row">
          <input type="text" name="judul[]" value="{{ item.judul }}" placeholder="misal: ⭐ Premium"/>
          <input type="text" name="link[]"  value="{{ item.link }}"  placeholder="misal: /premium atau https://wa.me/..."/>
          <button type="button" class="del-btn" onclick="this.closest('.item-row').remove()"><i class="fa fa-trash"></i></button>
        </div>
        {% endfor %}
      </div>
      <button type="button" class="add-btn" onclick="addItem()"><i class="fa fa-plus"></i> Tambah Item</button>
      <br><br>
      <label class="toggle-wrap" style="margin-bottom:1rem">
        <input type="checkbox" name="aktif" value="1" {% if marquee and marquee.aktif %}checked{% endif %}>
        Tampilkan teks berjalan
      </label>
      <br>
      <button type="submit" class="btn btn-primary btn-sm save-btn"><i class="fa fa-save"></i> Simpan Marquee</button>
    </form>
  </div>
</div>

<script>
function addItem(){
  const row = document.createElement('div');
  row.className = 'item-row';
  row.innerHTML = `
    <input type="text" name="judul[]" placeholder="misal: 📱 WA Admin"/>
    <input type="text" name="link[]"  placeholder="misal: https://wa.me/628..."/>
    <button type="button" class="del-btn" onclick="this.closest('.item-row').remove()"><i class="fa fa-trash"></i></button>
  `;
  document.getElementById('itemList').appendChild(row);
  row.querySelector('input').focus();
}
</script>
{% endblock %}
