{% extends 'base.html' %}
{% block title %}Edit Video — VIDEY{% endblock %}
{% block head %}
<style>
  .edit-page { max-width:600px; margin:0 auto; padding:1.5rem 1.25rem; }
  .page-header { display:flex; align-items:center; gap:.875rem; margin-bottom:1.5rem; }
  .page-header h1 { font-size:1.5rem; font-weight:800; letter-spacing:-.03em; }
  .thumb-preview { border-radius:var(--r); overflow:hidden; aspect-ratio:16/9; margin-bottom:1.25rem; background:var(--surface2); }
  .thumb-preview img { width:100%; height:100%; object-fit:cover; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:1.75rem; }
  .form-group { margin-bottom:1.25rem; }
  .form-group label { display:block; font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); margin-bottom:.5rem; }
  .form-group input, .form-group textarea { width:100%; padding:.7rem 1rem; background:var(--surface2); border:1px solid var(--border); border-radius:10px; outline:none; color:var(--text); font-family:var(--font); font-size:.9rem; transition:border-color .2s,box-shadow .2s; resize:vertical; }
  .form-group input:focus, .form-group textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--glow); }
  .form-group textarea { min-height:90px; }
  .form-actions { display:flex; gap:.75rem; margin-top:1.5rem; flex-wrap:wrap; }
  .save-btn { background:var(--accent); color:#fff; border:none; border-radius:99px; padding:.65rem 1.75rem; font-family:var(--font); font-weight:700; font-size:.95rem; cursor:pointer; transition:all .2s; box-shadow:0 4px 20px var(--glow); }
  .save-btn:hover { opacity:.88; transform:translateY(-1px); }
</style>
{% endblock %}
{% block content %}
<div class="edit-page">
  <div class="page-header">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost btn-sm">← Kembali</a>
    <h1>Edit Video</h1>
  </div>
  {% if video.thumbnail_url %}
  <div class="thumb-preview"><img src="{{ video.thumbnail_url }}" alt="{{ video.title }}"/></div>
  {% endif %}
  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Judul Video</label>
        <input type="text" name="title" value="{{ video.title }}" required/>
      </div>
      <div class="form-group">
        <label>Deskripsi</label>
        <textarea name="description">{{ video.description or '' }}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="save-btn">Simpan →</button>
        <a href="{{ url_for('watch', video_id=video.id) }}" class="btn btn-ghost" target="_blank">Lihat Video</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
