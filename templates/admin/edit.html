{% extends 'base.html' %}
{% block title %}Edit Video — VIDEY{% endblock %}

{% block head %}
<style>
  .edit-wrap { max-width: 600px; margin: 0 auto; padding: 2rem; }
  .form-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 2rem; }
  .form-group { margin-bottom: 1.5rem; }
  .form-group label {
    display: block; font-size: 0.75rem; color: var(--muted);
    margin-bottom: 0.5rem; font-family: var(--font-head);
    letter-spacing: 0.08em; text-transform: uppercase;
  }
  .form-group input, .form-group textarea {
    width: 100%; padding: 0.7rem 1rem;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; outline: none;
    color: var(--text); font-family: var(--font-body);
    font-size: 0.95rem; transition: border-color 0.2s; resize: vertical;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }
  .form-group textarea { min-height: 100px; }
  .form-actions { display: flex; gap: 1rem; margin-top: 1.5rem; }
  .save-btn {
    background: var(--accent); color: #000; border: none;
    border-radius: 8px; padding: 0.75rem 2rem;
    font-family: var(--font-head); font-weight: 700;
    font-size: 1rem; cursor: pointer; transition: opacity 0.2s;
  }
  .save-btn:hover { opacity: 0.85; }
</style>
{% endblock %}

{% block content %}
<div class="edit-wrap">
  <div style="display:flex;align-items:center;gap:1rem;margin-bottom:2rem">
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-ghost" style="padding:0.4rem 0.75rem">← Kembali</a>
    <h1 style="font-family:var(--font-head);font-size:1.6rem;font-weight:800;letter-spacing:-0.03em;margin:0">Edit Video</h1>
  </div>

  {% if video.thumbnail_url %}
  <div style="margin-bottom:1.5rem;border-radius:10px;overflow:hidden;aspect-ratio:16/9;max-width:400px">
    <img src="{{ video.thumbnail_url }}" style="width:100%;height:100%;object-fit:cover" />
  </div>
  {% endif %}

  <div class="form-card">
    <form method="POST">
      <div class="form-group">
        <label>Judul Video</label>
        <input type="text" name="title" value="{{ video.title }}" required />
      </div>
      <div class="form-group">
        <label>Deskripsi</label>
        <textarea name="description">{{ video.description or '' }}</textarea>
      </div>
      <div class="form-actions">
        <button type="submit" class="save-btn">Simpan →</button>
        <a href="{{ url_for('watch', video_id=video.id) }}" class="btn btn-ghost" target="_blank">Lihat Video</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
