{% extends 'base.html' %}
{% block title %}404 — VIDEYsky{% endblock %}
{% block content %}
<div class="flex flex-col items-center justify-center min-h-[calc(100vh-200px)] px-6 text-center">
  <!-- Glowing 404 -->
  <div class="relative mb-6">
    <div class="font-display font-black text-transparent bg-clip-text tracking-tighter leading-none select-none"
         style="font-size:clamp(6rem,20vw,12rem);background:linear-gradient(135deg,#f59e0b,#fbbf24,#f97316);-webkit-background-clip:text;filter:drop-shadow(0 0 40px rgba(245,158,11,0.3))">
      404
    </div>
    <div class="absolute inset-0 font-display font-black tracking-tighter leading-none text-transparent pointer-events-none"
         style="font-size:clamp(6rem,20vw,12rem);-webkit-text-stroke:1px rgba(245,158,11,0.08)">404</div>
  </div>

  <h2 class="font-display font-bold text-white text-xl mb-2 tracking-tight">Halaman tidak ditemukan</h2>
  <p class="text-gray-500 text-sm mb-8 max-w-xs">Video atau halaman yang kamu cari tidak ada atau sudah dihapus.</p>

  <div class="flex gap-3">
    <a href="{{ url_for('index') }}"
       class="flex items-center gap-2 px-5 py-2.5 bg-accent text-black text-sm font-bold rounded-full hover:bg-glow transition-all shadow-glow">
      <i class="fa fa-home"></i> Beranda
    </a>
    <button onclick="history.back()"
            class="flex items-center gap-2 px-5 py-2.5 bg-surface border border-white/10 text-gray-400 text-sm font-semibold rounded-full hover:border-white/20 hover:text-white transition-all">
      <i class="fa fa-arrow-left"></i> Kembali
    </button>
  </div>
</div>
{% endblock %}
